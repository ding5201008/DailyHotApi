version: "3.8"

services:
  DailyhotApi:
    build:
      context: .
      target: runner
    ports:
      - "6688:6688"
    volumes:
      - "./logs:/app/logs"
    environment:
      - PORT=6688
      - PUSH_ENABLED=${PUSH_ENABLED:-true}
      - PUSH_TIMEZONE=${PUSH_TIMEZONE:-Asia/Shanghai}
      - PUSH_SCHEDULE_TIMES=${PUSH_SCHEDULE_TIMES:-09:00,23:00}
      - PUSH_ITEMS_PER_SOURCE=${PUSH_ITEMS_PER_SOURCE:-10}
      - PUSH_CONCURRENCY=${PUSH_CONCURRENCY:-3}
      - PUSH_NO_CACHE=${PUSH_NO_CACHE:-true}
      - PUSH_BATCH_INTERVAL=${PUSH_BATCH_INTERVAL:-1000}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
      - WEWORK_WEBHOOK_URL=${WEWORK_WEBHOOK_URL:-}
      - WEWORK_MSG_TYPE=${WEWORK_MSG_TYPE:-markdown}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    user: "114514"
    restart: always
