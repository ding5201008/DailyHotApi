# DailyHotApi Auto Keep-Alive Workflow
# This workflow runs weekly and pushes a keep-alive commit if the repo has been inactive for 50+ days
# This prevents GitHub Actions from disabling scheduled workflows due to 60-day inactivity

name: Auto Keep-Alive

on:
  schedule:
    # Run every Monday at 00:00 UTC (08:00 Beijing time)
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check last commit date
        id: check
        run: |
          # Get last commit date
          LAST_COMMIT_DATE=$(git log -1 --format="%ai")
          echo "Last commit date: $LAST_COMMIT_DATE"
          
          # Calculate days since last commit
          LAST_EPOCH=$(date -d "$LAST_COMMIT_DATE" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_SINCE=$(( (NOW_EPOCH - LAST_EPOCH) / 86400 ))
          echo "Days since last commit: $DAYS_SINCE"
          echo "days_since=$DAYS_SINCE" >> $GITHUB_OUTPUT
          
          if [ "$DAYS_SINCE" -lt 50 ]; then
            echo "Less than 50 days since last commit, skipping keep-alive"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "More than 50 days since last commit, proceeding with keep-alive"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Push keep-alive commit
        if: steps.check.outputs.skip == 'false'
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Update keep-alive file with current timestamp
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          cat > .keep-alive << EOF
          # Keep-Alive File
          # This file prevents GitHub Actions from disabling scheduled workflows
          # due to 60-day repository inactivity.
          #
          # Last updated: $TIMESTAMP
          # Auto-generated by DailyHotApi keep-alive workflow
          # Days since last real commit: ${{ steps.check.outputs.days_since }}
          EOF
          
          # Commit and push
          git add .keep-alive
          git commit -m "chore: auto keep-alive (inactive for ${{ steps.check.outputs.days_since }} days)"
          git push
          
          echo "✅ Keep-alive commit pushed successfully!"